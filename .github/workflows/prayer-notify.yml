name: VMM Prayer Time Notifications

on:
  schedule:
    # Runs every hour — the script checks if a prayer falls within the next 60 mins
    - cron: '0,30 * * * *'
    # Daily summary at 4 AM Melbourne time (17:00 UTC AEDT / 18:00 UTC AEST)
    - cron: '0 17 * * *'

  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Send a test notification immediately?'
        required: false
        default: 'true'
        type: boolean

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run prayer notification script
        env:
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python send_prayer_notifications.py --summary
          elif [ "${{ github.event.schedule }}" = "0 17 * * *" ]; then
            python send_prayer_notifications.py --summary
          else
            python send_prayer_notifications.py
          fi
