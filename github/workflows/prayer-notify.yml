name: VMM Prayer Time Notifications

on:
  # Run every day at 13:00 UTC = midnight AEST (UTC+11 summer) / 11pm AEST (UTC+10 winter)
  # Adjust offset below if notifications arrive an hour early/late after daylight saving changes
  schedule:
    - cron: '0 13 * * *'   # ← 13:00 UTC = midnight Melbourne AEDT (UTC+11)
    # - cron: '0 14 * * *' # ← uncomment this line (and comment above) during AEST (UTC+10, Apr–Oct)

  # Allow manual trigger from GitHub Actions tab for testing
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    timeout-minutes: 1440   # 24h max — keeps runner alive all day to fire each prayer on time

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run prayer notification script
        env:
          PUSHOVER_USER_KEY:  ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python send_prayer_notifications.py
